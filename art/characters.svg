    <path d="M20 120 L120 120 L120 80 L70 30 L20 80 Z" fill="#5c3d24" stroke="#2a1810" stroke-width="2"/>
    <rect x="35" y="90" width="25" height="30" fill="#3d2817" stroke="#2a1810" stroke-width="2"/>
    <rect x="75" y="90" width="25" height="30" fill="#3d2817" stroke="#2a1810" stroke-width="2"/>
    <rect x="50" y="55" width="30" height="25" fill="#8b5a2b" stroke="#2a1810" stroke-width="2"/>
    <rect x="10" y="115" width="130" height="35" fill="#8b5a2b" stroke="#2a1810" stroke-width="2"/>
    <text x="15" y="138" fill="#f4c430" font-family="Georgia, serif" font-size="14" font-weight="bold">SHACK</text>
    <path d="M5 150 Q70 165 135 150" stroke="#2d4a2d" stroke-width="3" fill="none"/>
    <text x="30" y="175" fill="#5c3d24" font-family="Georgia, serif" font-size="10" font-style="italic">our cabin (weird)</text>
  </g>

  <!-- Decorative arrows & notes -->
  <path d="M170 200 Q200 180 230 200" stroke="#8b3a2a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="155" y="195" fill="#8b3a2a" font-family="Georgia, serif" font-size="9" transform="rotate(-8 155 195)">party here!</text>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8b3a2a"/>
    </marker>
