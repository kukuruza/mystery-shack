  <path d="M35 150 L45 165 L55 150 L65 165 L75 150" stroke="#f4c430" stroke-width="2" fill="none"/>
  <path d="M40 175 L50 190 L60 175 L70 190" stroke="#f4c430" stroke-width="2" fill="none"/>
    <path d="M55 210 L55 240" stroke="#2a1810" stroke-width="2"/>
